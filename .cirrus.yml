firecracker_probe_task:
  name: Firecracker VM Command Probe (KVM)
  timeout_in: 30m

  container:
    image: ubuntu:24.04
    kvm: true
    cpu: 2
    memory: 4G

  setup_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl tar jq busybox-static cpio python3-pip

  probe_script:
    - set -euxo pipefail
    - uname -a
    - id
    - |
      RANGE=""
      if [ -n "${CIRRUS_BASE_SHA:-}" ]; then
        RANGE="${CIRRUS_BASE_SHA}..${CIRRUS_CHANGE_IN_REPO:-HEAD}"
      elif git rev-parse HEAD~1 >/dev/null 2>&1; then
        RANGE="HEAD~1..HEAD"
      fi
      if [ -n "$RANGE" ]; then
        python3 -m pip install --break-system-packages --quiet commitizen
        python3 -m commitizen check --rev-range "$RANGE"
      fi
    - ls -l /dev/kvm
    - test -r /dev/kvm
    - test -w /dev/kvm

    - ARCH="$(uname -m)"
    - |
      case "$ARCH" in
        x86_64) FC_ARCH="x86_64" ; KERNEL_URL="https://s3.amazonaws.com/spec.ccfc.min/img/quickstart_guide/x86_64/kernels/vmlinux.bin" ;;
        aarch64|arm64) FC_ARCH="aarch64" ; KERNEL_URL="https://s3.amazonaws.com/spec.ccfc.min/img/quickstart_guide/aarch64/kernels/vmlinux.bin" ;;
        *) echo "Unsupported arch: $ARCH"; exit 1 ;;
      esac

    - FC_VERSION="v1.9.0"
    - FC_TGZ="firecracker-${FC_VERSION}-${FC_ARCH}.tgz"
    - FC_URL="https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/${FC_TGZ}"
    - curl -fsSL "$FC_URL" -o /tmp/firecracker.tgz
    - tar -xzf /tmp/firecracker.tgz -C /tmp
    - FC_DIR="/tmp/release-${FC_VERSION}-${FC_ARCH}"
    - install -m 0755 "${FC_DIR}/firecracker-${FC_VERSION}-${FC_ARCH}" /usr/local/bin/firecracker
    - install -m 0755 "${FC_DIR}/jailer-${FC_VERSION}-${FC_ARCH}" /usr/local/bin/jailer
    - firecracker --version
    - jailer --version

    - curl -fsSL "$KERNEL_URL" -o /tmp/vmlinux.bin

    - mkdir -p /tmp/initramfs/bin /tmp/initramfs/proc /tmp/initramfs/sys /tmp/initramfs/dev
    - cp /bin/busybox /tmp/initramfs/bin/busybox
    - |
      cat > /tmp/initramfs/init <<'SH'
      #!/bin/busybox sh
      mount -t proc none /proc
      mount -t sysfs none /sys
      echo CIRRUS_VM_CMD_OK
      /bin/busybox uname -a
      /bin/busybox poweroff -f
      SH
    - chmod +x /tmp/initramfs/init
    - (cd /tmp/initramfs && find . -print0 | cpio --null -ov --format=newc | gzip -9 > /tmp/initramfs.cpio.gz)

    - SOCK=/tmp/firecracker.socket
    - rm -f "$SOCK" /tmp/firecracker.stdout /tmp/firecracker.stderr
    - firecracker --api-sock "$SOCK" > /tmp/firecracker.stdout 2> /tmp/firecracker.stderr &
    - FC_PID=$!
    - for i in $(seq 1 50); do [ -S "$SOCK" ] && break; sleep 0.1; done
    - test -S "$SOCK"

    - |
      curl --fail --silent --show-error --unix-socket "$SOCK" \
        -X PUT 'http://localhost/machine-config' \
        -H 'Content-Type: application/json' \
        -d '{"vcpu_count":1,"mem_size_mib":256,"smt":false}'

    - |
      curl --fail --silent --show-error --unix-socket "$SOCK" \
        -X PUT 'http://localhost/boot-source' \
        -H 'Content-Type: application/json' \
        -d '{"kernel_image_path":"/tmp/vmlinux.bin","initrd_path":"/tmp/initramfs.cpio.gz","boot_args":"console=ttyS0 reboot=k panic=1 pci=off"}'

    - |
      curl --fail --silent --show-error --unix-socket "$SOCK" \
        -X PUT 'http://localhost/actions' \
        -H 'Content-Type: application/json' \
        -d '{"action_type":"InstanceStart"}'

    - |
      for i in $(seq 1 120); do
        if grep -q "CIRRUS_VM_CMD_OK" /tmp/firecracker.stdout; then
          echo "Guest command marker found"
          break
        fi
        if ! kill -0 "$FC_PID" 2>/dev/null; then
          echo "Firecracker exited before marker"
          break
        fi
        sleep 0.5
      done

    - grep -q "CIRRUS_VM_CMD_OK" /tmp/firecracker.stdout

    - kill "$FC_PID" || true
    - wait "$FC_PID" || true

runtime_real_template_task:
  name: Runtime-Real Template (Talos + ext + imp e2e)
  only_if: true
  timeout_in: 120m

  container:
    image: ubuntu:24.04
    kvm: true
    cpu: 4
    memory: 8G

  env:
    IMP_REPO: https://github.com/syscode-labs/imp.git
    IMP_REF: main
    EXT_REPO: https://github.com/syscode-labs/talos-ext-firecracker.git
    EXT_REF: main
    E2E_LABEL_FILTER: smoke

  setup_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl git jq

  runtime_script:
    - set -euxo pipefail
    - echo "RUN_RUNTIME_REAL=$RUN_RUNTIME_REAL"
    - echo "IMP_REPO=$IMP_REPO IMP_REF=$IMP_REF"
    - echo "EXT_REPO=$EXT_REPO EXT_REF=$EXT_REF"
    - echo "E2E_LABEL_FILTER=$E2E_LABEL_FILTER"

    - git clone "$IMP_REPO" /tmp/imp
    - git -C /tmp/imp checkout "$IMP_REF"

    - git clone "$EXT_REPO" /tmp/talos-ext-firecracker
    - git -C /tmp/talos-ext-firecracker checkout "$EXT_REF"

    - |
      if [ ! -x /tmp/talos-ext-firecracker/scripts/ci/provision-talos-with-extension.sh ]; then
        echo "Missing required extension SOT script: scripts/ci/provision-talos-with-extension.sh"
        echo "Expected contract: script provisions Talos cluster with extension, exports kubeconfig usable by e2e tests."
        exit 2
      fi

    - |
      /tmp/talos-ext-firecracker/scripts/ci/provision-talos-with-extension.sh

    - |
      if [ ! -x /tmp/talos-ext-firecracker/scripts/ci/run-imp-e2e-runtime-real.sh ]; then
        echo "Missing required extension SOT script: scripts/ci/run-imp-e2e-runtime-real.sh"
        echo "Expected contract: script runs imp e2e runtime-real against the provisioned Talos cluster."
        exit 2
      fi

    - |
      IMP_REPO_DIR=/tmp/imp E2E_LABEL_FILTER="$E2E_LABEL_FILTER" \
        /tmp/talos-ext-firecracker/scripts/ci/run-imp-e2e-runtime-real.sh
